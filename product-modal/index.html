<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Product Modal</title>
  </head>
  <body>
    <div class="flex items-center justify-center min-h-screen bg-slate-100 p-6">
      <!-- Modal Card -->
      <div
        class="bg-white p-6 md:p-12 rounded-3xl shadow-2xl flex flex-col md:flex-row gap-10 max-w-4xl w-full"
      >
        <!-- Image Section -->
        <div
          class="flex-1 flex items-center justify-center bg-transparent group overflow-hidden"
        >
          <img
            src="./images/headphone.png"
            alt="Headphone"
            class="w-72 transition-transform duration-500 group-hover:scale-110 "
          />
        </div>

        <!-- Content Section -->
        <div class="flex-1 flex flex-col gap-4">
          <!-- Badge & Title -->
          <div>
            <span
              class="inline-block bg-black text-white text-xs font-bold px-3 py-1 rounded-full mb-4"
            >
              Free shipping
            </span>
            <h1 class="text-2xl font-bold text-slate-800 leading-tight">
              Razer Kraken Kitty Edt Gaming Headset Quartz
            </h1>
          </div>

          <!-- Price Section -->
          <div class="mt-2">
            <p class="text-sm line-through text-slate-400">$799</p>
            <p class="text-4xl font-bold text-slate-900">$599</p>
            <p class="text-xs text-slate-400 mt-1 italic">
              The offer is valid until April 3 or as long as stock lasts!
            </p>
          </div>

          <!-- Main Action -->
          <button
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95"
          >
            Add to cart
          </button>

          <!-- Stock Status -->
          <div class="flex items-center gap-2 mt-2">
            <div
              class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"
            ></div>
            <p class="text-sm text-slate-600 font-medium">50+ pcs. in stock.</p>
          </div>

          <!-- Secondary Actions -->
          <div class="flex gap-4 mt-4">
            <button
              class="flex-1 flex items-center justify-center gap-2 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition-colors"
            >
              <svg
                class="w-5 h-5 text-slate-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"
                ></path>
              </svg>
              <span class="text-sm font-semibold">Add to cart</span>
            </button>
            <button
              class="flex-1 flex items-center justify-center gap-2 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition-colors"
            >
              <svg
                class="w-5 h-5 text-slate-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                ></path>
              </svg>
              <span class="text-sm font-semibold">Add to wishlist</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
