<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Email Subscribe</title>
  </head>
  <body>
    <!-- backgound container -->
    <div class="flex items-center justify-center h-screen bg-zinc-700">
      <!-- card -->
      <div class="p-2 rounded-2xl bg-zinc-800 cursor-pointer shadow-2xl">
        <!-- flex container -->
        <div class="flex flex-col md:flex-row rounded-l-xl overflow-hidden">
          <img
            src="./images/image.jpg"
            alt=""
            class="object-cover h-80 md:h-64 rounded-xl md:rounded-l-2xl md:rounded-r-none hover:scale-105 duration-500"
          />
          <div class="p-6 md:p-12">
            <h2
              class="font-serif font-semibold text-center md:text-left text-white text-xl"
            >
              Get diet and fitness tips in your inbox
            </h2>
            <p
              class="my-4 max-w-xs text-sm leading-5 tracking-wide text-white text-center md:text-left"
            >
              Eat better and exercise better. Sign up for the Diet&Fitness
              newsletter
            </p>
            <div class="flex flex-col md:flex-row gap-4">
              <input
                type="text"
                placeholder="Enter your email address"
                class="p-2 border border-zinc-400 placeholder:text-center md:placeholder:text-left placeholder:text-zinc-300 focus:outline-none rounded-lg"
              />
              <button
                class="text-zinc-800 bg-lime-500 hover:text-white hover:bg-lime-700 duration-500 px-4 py-2 rounded-lg"
              >
                Subscribe
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
