<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login Modal</title>
  </head>
  <body>
    <div class="flex items-center justify-center min-h-screen bg-rose-50 p-6">
      <!-- Main Modal -->
      <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row max-w-4xl w-full overflow-hidden">
        
        <!-- Left Section: Form -->
        <div class="flex-1 p-10 md:p-16">
          <h1 class="text-4xl font-serif font-bold text-slate-800 mb-4">Log In</h1>
          <p class="text-slate-400 text-sm mb-10 leading-relaxed">
            Log in to your account to upload or download pictures, videos or music.
          </p>

          <!-- Input Group -->
          <div class="space-y-6">
            <input type="email" placeholder="Enter your email address" class="w-full border border-slate-200 p-4 rounded-lg outline-none focus:border-teal-600 transition-colors placeholder:text-slate-300">
            
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
              <a href="#" class="text-teal-600 font-medium hover:underline text-sm">Forgot password?</a>
              <button class="bg-[#00607d] text-white px-10 py-4 rounded-lg font-bold flex items-center justify-center gap-2 group hover:opacity-90 active:scale-95 transition-all w-full md:w-auto">
                <span>Next</span>
                <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </button>
            </div>
          </div>

          <!-- Divider -->
          <div class="relative my-12">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400">Or log in with</span></div>
          </div>

          <!-- Social Buttons -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-lg hover:bg-slate-50 transition-colors">
              <img src="./images/facebook.png" class="w-5 h-5">
              <span class="text-sm font-semibold text-slate-700">Facebook</span>
            </button>
            <button class="flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-lg hover:bg-slate-50 transition-colors">
              <img src="./images/google.png" class="w-5 h-5">
              <span class="text-sm font-semibold text-slate-700">Google</span>
            </button>
          </div>
        </div>

        <!-- Right Section: Image -->
        <div class="flex-1 relative hidden md:block">
          <img src="./images/image.jpg" class="w-full h-full object-cover">
          <!-- Close Button -->
          <button class="absolute top-6 right-6 bg-white/90 backdrop-blur-sm w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:scale-110 hover:bg-white active:scale-95 transition-all">
            <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>

      </div>
    </div>
  </body>
</html>
